<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #1a73e8;
      color: #fff;
      padding: 16px 24px;
      font-size: 18px;
      font-weight: 600;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .msg.user {
      align-self: flex-end;
      background: #1a73e8;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.bot {
      align-self: flex-start;
      background: #fff;
      color: #202124;
      border: 1px solid #e0e0e0;
      border-bottom-left-radius: 4px;
    }

    .msg.error {
      align-self: flex-start;
      background: #fce8e6;
      color: #c5221f;
      border: 1px solid #f5c6cb;
      border-bottom-left-radius: 4px;
    }

    .typing {
      align-self: flex-start;
      color: #999;
      font-style: italic;
      padding: 8px 16px;
    }

    #input-area {
      display: flex;
      padding: 16px 24px;
      background: #fff;
      border-top: 1px solid #e0e0e0;
      gap: 12px;
    }

    #message {
      flex: 1;
      padding: 12px 16px;
      font-size: 16px;
      border: 1px solid #dadce0;
      border-radius: 24px;
      outline: none;
    }

    #message:focus { border-color: #1a73e8; }

    #send {
      padding: 12px 24px;
      font-size: 16px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 24px;
      cursor: pointer;
    }

    #send:disabled { opacity: 0.5; cursor: not-allowed; }
    #send:hover:not(:disabled) { background: #1765cc; }
  </style>
</head>
<body>
  <header>Gemini Chatbot — Cloud Run Demo</header>

  <div id="chat"></div>

  <div id="input-area">
    <input type="text" id="message" placeholder="Type a message..." autocomplete="off">
    <button id="send">Send</button>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("message");
    const sendBtn = document.getElementById("send");

    function addMessage(text, cls) {
      const div = document.createElement("div");
      div.className = "msg " + cls;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    async function send() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, "user");
      input.value = "";
      sendBtn.disabled = true;

      const typing = document.createElement("div");
      typing.className = "typing";
      typing.textContent = "Gemini is thinking...";
      chat.appendChild(typing);
      chat.scrollTop = chat.scrollHeight;

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text }),
        });
        const data = await res.json();
        typing.remove();

        if (res.ok) {
          addMessage(data.reply, "bot");
        } else {
          addMessage("Error: " + (data.error || "Unknown error"), "error");
        }
      } catch (err) {
        typing.remove();
        addMessage("Network error: " + err.message, "error");
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    sendBtn.addEventListener("click", send);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    input.focus();
  </script>
</body>
</html>
